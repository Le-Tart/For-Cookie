<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Cookie 💖</title>

<style>
body {
  margin: 0;
  font-family: "Comic Sans MS", cursive;
  background: linear-gradient(135deg, pink, purple);
  color: white;
  text-align: center;
}

.container {
  padding: 40px 20px;
}

.card {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 20px;
  margin: 20px auto;
  max-width: 500px;
}

button {
  background: white;
  color: purple;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
}

img {
  width: 80%;
  border-radius: 20px;
}

.hearts {
  position: fixed;
  width: 100%;
  bottom: -50px;
  font-size: 24px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); }
  to { transform: translateY(-120vh); }
}
</style>
</head>

<body>

<div class="container">

<h1>For Cookie 🍪💖</h1>
<p>From Tart 😌</p>

<!-- 🎵 MUSIC -->
<audio autoplay loop controls>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- 💖 TIMER -->
<div class="card">
  <h2>How long we've been together so far ⏳</h2>
  <p id="timer"></p>
</div>

<!-- 🖼️ PHOTO SLIDESHOW -->
<div class="card">
  <h2>Us 📸</h2>
  <img id="slideshow" src="pic1.jpg">
</div>

<!-- 😂 JOKES -->
<div class="card">
  <h2>Important Button</h2>
  <button onclick="joke()">Click me</button>
  <p id="jokeText"></p>
</div>

<!-- 👀 SECRET -->
<div class="card">
  <button onclick="secret()">Do NOT click 👀</button>
  <p id="secretText"></p>
</div>

<!-- 💌 TYPING LETTER -->
<div class="card">
  <h2>A Message For You 💌</h2>
  <p id="letter"></p>
</div>

</div>

<div class="hearts">💖 💜 💗 💞 💓</div>

<script>
// ⏳ TIMER (CHANGE DATE HERE)
const startDate = new Date("2024-01-01");

function updateTimer() {
  const now = new Date();
  const diff = now - startDate;

  const days = Math.floor(diff / (1000*60*60*24));
  document.getElementById("timer").innerText =
    days + " days of liking you 😌💖";
}
setInterval(updateTimer, 1000);

// 🖼️ SLIDESHOW (ADD YOUR IMAGES)
const images = ["pic1.jpg", "pic2.jpg", "pic3.jpg"];
let index = 0;

setInterval(() => {
  index = (index + 1) % images.length;
  document.getElementById("slideshow").src = images[index];
}, 2000);

// 😂 JOKES
const jokes = [
  "WHY? ... chicken butt 🐔😂",
  "MEHHHHHHHH 😭",
  "What the helly??? 🤨",
  "You're weird... but I like it 💜"
];

function joke() {
  const random = jokes[Math.floor(Math.random() * jokes.length)];
  document.getElementById("jokeText").innerText = random;
}

// 👀 SECRET
function secret() {
  document.getElementById("secretText").innerText =
    "Okay fine… I like you A LOT 💖😌";
}

// 💌 TYPING EFFECT
const message = "I made this for you because you mean a lot to me. You're funny, cute, and honestly my favorite person 💖";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("letter").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

typeWriter();
</script>

</body>
</html>
